options:
  buildHeader: [ "load(\"@io_bazel_rules_scala//scala:scala_import.bzl\", \"scala_import\")",
    "load(\"@io_bazel_rules_scala//scala:scala.bzl\", \"scala_library\")" ]
  languages: [ "java", "scala:2.12.10" ]
  resolverType: "coursier"
  resolvers:
    - id: "mavencentral"
      type: "default"
      url: https://repo.maven.apache.org/maven2/
  strictVisibility: false
  transitivity: runtime_deps
  versionConflictPolicy: highest

dependencies:
  co.fs2:
    fs2:
      lang: scala
      modules: [ "core", "io" ]
      version: "2.3.0"

  com.google.auth:
    google-auth-library-oauth2-http:
      lang: java
      version: "0.20.0"

  com.google.cloud:
    google-cloud-core:
      lang: java
      version: "1.93.1"
    google-cloud-storage:
      lang: java
      version: "1.102.0"

  io.circe:
    circe:
      lang: scala
      modules: [ "core", "generic", "parser" ]
      version: "0.13.0"

  org.http4s:
    http4s:
      lang: scala
      modules: [ "async-http-client", "blaze-server", "core", "dsl" ]
      version: "0.21.4"

  org.scalacheck:
    scalacheck:
      lang: scala
      version: "1.14.3"

  org.scalatest:
    scalatest:
      lang: scala
      version: "3.1.2"

  org.scalatestplus:
    scalatestplus-scalacheck:
      lang: scala
      version: "3.1.0.0-RC2"

  org.typelevel:
    cats:
      lang: scala
      modules: [ "core", "free", "kernel" ]
      version: "2.1.1"

replacements:
  org.scala-lang:
    scala-compiler:
      lang: scala/unmangled
      target: "@io_bazel_rules_scala_scala_compiler//:io_bazel_rules_scala_scala_compiler"
    scala-library:
      lang: scala/unmangled
      target: "@io_bazel_rules_scala_scala_library//:io_bazel_rules_scala_scala_library"
    scala-reflect:
      lang: scala/unmangled
      target: "@io_bazel_rules_scala_scala_reflect//:io_bazel_rules_scala_scala_reflect"

  org.scala-lang.modules:
    scala-parser-combinators:
      lang: scala
      target:
        "@io_bazel_rules_scala_scala_parser_combinators//:io_bazel_rules_scala_scala_parser_combinators"
    scala-xml:
      lang: scala
      target: "@io_bazel_rules_scala_scala_xml//:io_bazel_rules_scala_scala_xml"
